<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <!-- Illustrated scene: rodent control & proofing. Replace with a photo any time. -->
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef4f8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="800" height="480" rx="28" fill="url(#panel)"/>
  <circle cx="120" cy="110" r="90" fill="#d9f2ec"/>
  <circle cx="700" cy="120" r="70" fill="#fdeccc"/>

  <!-- wall + skirting -->
  <rect x="40" y="290" width="720" height="26" rx="6" fill="#cfdeeb"/>
  <path d="M40 316h720" stroke="#94a3b8" stroke-width="3"/>
  <ellipse cx="400" cy="430" rx="260" ry="15" fill="rgba(15,23,42,.07)"/>

  <!-- mouse hole, sealed -->
  <g>
    <path d="M560 316a52 52 0 0 1 104 0z" fill="#334155"/>
    <path d="M560 316a52 52 0 0 1 104 0z" fill="rgba(20,184,166,.25)"/>
    <g stroke="#14b8a6" stroke-width="8" stroke-linecap="round">
      <path d="M566 306h92M576 288h72M592 272h40"/>
    </g>
    <circle cx="612" cy="292" r="16" fill="#0f766e"/>
    <path d="M606 292l5 5 9 -10" stroke="#fff" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- mouse -->
  <g transform="translate(300 366)">
    <path d="M-90 22c-34 8 -48 34 -24 52" fill="none" stroke="#64748b" stroke-width="9" stroke-linecap="round"/>
    <path d="M-88 0c0 -44 40 -66 84 -66 38 0 70 20 84 48 16 2 28 14 28 28 0 16 -14 26 -30 26h-136c-20 0 -30 -16 -30 -36z" fill="#8ea3b8"/>
    <path d="M-4 -66c44 0 76 20 84 48" fill="none" stroke="#7b90a6" stroke-width="6"/>
    <circle cx="-12" cy="-52" r="24" fill="#f4b8c4"/>
    <circle cx="-12" cy="-52" r="13" fill="#e28ba0"/>
    <circle cx="66" cy="-4" r="6" fill="#1e293b"/>
    <ellipse cx="92" cy="8" rx="7" ry="5" fill="#f4b8c4"/>
    <g stroke="#94a3b8" stroke-width="3" stroke-linecap="round">
      <path d="M96 4l26 -8M98 10h27M96 16l26 8"/>
    </g>
  </g>

  <!-- bait station -->
  <g>
    <rect x="480" y="368" width="130" height="64" rx="14" fill="#0f766e"/>
    <rect x="492" y="380" width="106" height="40" rx="10" fill="#14b8a6"/>
    <path d="M480 400a12 12 0 0 1 0 -1" stroke="none"/>
    <circle cx="545" cy="400" r="12" fill="#f8fafc"/>
    <rect x="541" y="398" width="8" height="12" rx="3" fill="#0f766e"/>
    <path d="M482 398a16 16 0 0 1 -14 2" stroke="none"/>
  </g>
  <path d="M60 432h680" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>

  <!-- warning cone -->
  <g transform="translate(120 372)">
    <path d="M30 0l22 60h-44z" fill="#f59e0b"/>
    <rect x="-2" y="56" width="64" height="12" rx="6" fill="#d97706"/>
    <path d="M18 34h24" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- sparkles -->
  <g fill="#f59e0b">
    <path d="M420 120l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4z" opacity=".8"/>
    <path d="M660 220l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3z" opacity=".6"/>
  </g>
</svg>
