<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <!-- Illustrated scene: termite barrier protection. Replace with a photo any time. -->
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef4f8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="800" height="480" rx="28" fill="url(#panel)"/>
  <circle cx="130" cy="100" r="90" fill="#d9f2ec"/>
  <circle cx="700" cy="410" r="70" fill="#fdeccc"/>

  <!-- house -->
  <g>
    <path d="M250 210 400 92l150 118z" fill="#2f4d6e"/>
    <path d="M400 92l150 118h-42L400 128z" fill="#243b55"/>
    <rect x="284" y="210" width="232" height="150" rx="6" fill="#e3edf5"/>
    <rect x="316" y="240" width="52" height="52" rx="8" fill="#8fc6e8"/>
    <path d="M342 240v52M316 266h52" stroke="#f6fafd" stroke-width="5"/>
    <rect x="432" y="252" width="52" height="108" rx="8" fill="#0f766e"/>
    <circle cx="472" cy="308" r="5" fill="#f6c66b"/>
  </g>

  <!-- wooden beam cutaway with termite damage -->
  <g>
    <rect x="86" y="330" width="176" height="60" rx="12" fill="#d99a4e"/>
    <path d="M100 348c30 -10 60 12 90 0s50 8 58 4" fill="none" stroke="#b97c33" stroke-width="6" stroke-linecap="round"/>
    <path d="M104 372c26 8 58 -10 86 2s48 -6 60 -2" fill="none" stroke="#b97c33" stroke-width="6" stroke-linecap="round"/>
    <circle cx="140" cy="360" r="9" fill="#8a5a2b"/>
    <circle cx="212" cy="368" r="9" fill="#8a5a2b"/>
  </g>
  <!-- termites approaching -->
  <g>
    <g transform="translate(150 428)">
      <ellipse cx="0" cy="0" rx="16" ry="11" fill="#efe0c8"/>
      <circle cx="18" cy="-2" r="8" fill="#8a5a2b"/>
      <g fill="none" stroke="#8a5a2b" stroke-width="3.4" stroke-linecap="round">
        <path d="M-10 8l-6 8M0 9l0 9M10 8l6 8M22 -10l6 -7M14 -12l2 -9"/>
      </g>
    </g>
    <g transform="translate(230 440) rotate(-8)">
      <ellipse cx="0" cy="0" rx="16" ry="11" fill="#efe0c8"/>
      <circle cx="18" cy="-2" r="8" fill="#8a5a2b"/>
      <g fill="none" stroke="#8a5a2b" stroke-width="3.4" stroke-linecap="round">
        <path d="M-10 8l-6 8M0 9l0 9M10 8l6 8M22 -10l6 -7M14 -12l2 -9"/>
      </g>
    </g>
  </g>

  <!-- protective barrier dome -->
  <g>
    <path d="M300 452a180 180 0 0 1 360 0" fill="rgba(20,184,166,.14)" stroke="#14b8a6" stroke-width="6" stroke-dasharray="14 12" stroke-linecap="round"/>
    <g transform="translate(440 300)">
      <path d="M40 0l40 15v32c0 30 -40 50 -40 50s-40 -20 -40 -50V15z" fill="#0f766e"/>
      <path d="M40 8l32 12v27c0 24 -32 40 -32 40s-32 -16 -32 -40V20z" fill="#14b8a6"/>
      <path d="M24 48l12 12 22 -24" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- ground -->
  <path d="M60 452h680" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
  <!-- sparkles -->
  <g fill="#f59e0b">
    <path d="M620 140l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4z"/>
    <path d="M180 260l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3z" opacity=".7"/>
  </g>
</svg>
